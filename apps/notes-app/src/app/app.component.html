<mat-sidenav-container fullscreen>
    <mat-sidenav #start>
        <mat-nav-list>
            @if (isLoggedOut()) {
                <a mat-list-item routerLink="/login" (click)="start.close()">
                    <mat-icon>account_circle</mat-icon>
                    <span>Login</span>
                </a>
            }

            @if (isLoggedIn()) {
                <button mat-list-item type="button" (click)="logout(); start.close()">
                    <mat-icon>exit_to_app</mat-icon>
                    <span>Logout</span>
                </button>
            }
        </mat-nav-list>
    </mat-sidenav>

    <mat-toolbar color="primary">
        <button class="text-white mat-primary" mat-icon-button (click)="start.open('mouse')" color="primary">
            <mat-icon>menu</mat-icon>
        </button>
        <span class="text-white flex-1"> {{ title }} </span>
        @if (isLoggedIn()) {
            <button mat-icon-button class="text-white" (click)="logout()" matTooltip="Logout" aria-label="Logout">
                <mat-icon>exit_to_app</mat-icon>
            </button>
        }
    </mat-toolbar>

    @if (loading) {
        <div class="fixed inset-0 z-10 flex items-center justify-center bg-white bg-opacity-50">
            <mat-spinner></mat-spinner>
        </div>
    }

    <router-outlet></router-outlet>
</mat-sidenav-container>
