name: Mobile Builds

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    actions: read
    contents: read

jobs:
    android:
        name: Android Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'

            - uses: actions/setup-java@v4
              with:
                  distribution: 'temurin'
                  java-version: '17'

            - name: Setup Android SDK
              uses: android-actions/setup-android@v3

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Build Angular app
              run: npx nx build tabata-ai --configuration=development

            - name: Sync Capacitor
              run: npx cap sync android
              working-directory: apps/tabata-ai

            - name: Build Android (Debug)
              run: |
                  chmod +x ./gradlew
                  ./gradlew assembleDebug
              working-directory: apps/tabata-ai/android

            - name: Upload APK artifact
              uses: actions/upload-artifact@v4
              with:
                  name: android-debug-apk
                  path: apps/tabata-ai/android/app/build/outputs/apk/debug/*.apk
                  retention-days: 7

    ios:
        name: iOS Build
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Build Angular app
              run: npx nx build tabata-ai --configuration=development

            - name: Sync Capacitor
              run: npx cap sync ios
              working-directory: apps/tabata-ai

            - name: Build iOS (No Signing)
              run: |
                  xcodebuild \
                    -workspace App.xcworkspace \
                    -scheme App \
                    -configuration Debug \
                    -destination 'generic/platform=iOS Simulator' \
                    -derivedDataPath build \
                    CODE_SIGNING_ALLOWED=NO \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGN_IDENTITY="" \
                    build
              working-directory: apps/tabata-ai/ios/App
