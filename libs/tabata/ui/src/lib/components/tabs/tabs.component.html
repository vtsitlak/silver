<ion-tabs>
    <ion-tab-bar slot="bottom">
        <ion-tab-button tab="dashboard" [routerLink]="['dashboard']">
            <ion-icon inert name="speedometer-outline"></ion-icon>
            <ion-label i18n="@@dashboard">Dashboard</ion-label>
        </ion-tab-button>

        <ion-tab-button tab="workouts" [routerLink]="['workouts']">
            <ion-icon inert name="barbell"></ion-icon>
            <ion-label i18n="@@workouts">Workouts</ion-label>
        </ion-tab-button>

        <ion-tab-button tab="history" [routerLink]="['history']">
            <ion-icon inert name="calendar"></ion-icon>
            <ion-label i18n="@@history">History</ion-label>
        </ion-tab-button>

        <ion-tab-button tab="profile" [routerLink]="['profile']">
            <ion-icon inert name="person-outline"></ion-icon>
            <ion-label i18n="@@profile">Profile</ion-label>
        </ion-tab-button>
    </ion-tab-bar>
</ion-tabs>
