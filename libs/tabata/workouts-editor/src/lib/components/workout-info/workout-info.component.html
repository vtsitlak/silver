<ion-header [translucent]="true">
    <tbt-toolbar [title]="pageTitle()">
        <ion-buttons slot="start">
            <ion-back-button defaultHref="/tabs/workouts"></ion-back-button>
        </ion-buttons>
    </tbt-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
    <form (ngSubmit)="onSubmit()" class="workout-info-form" novalidate>
        <ion-list>
            <ion-item>
                <ion-input [required]="true" id="workout-name" type="text" placeholder="Enter workout name" [formField]="infoForm.name">
                    <ion-label position="stacked">Workout Name <span>*</span></ion-label>
                </ion-input>
            </ion-item>

            <ion-item>
                <ion-textarea [required]="true" id="workout-description" placeholder="Enter workout description" [formField]="infoForm.description" rows="3">
                    <ion-label position="stacked">Description <span>*</span></ion-label>
                </ion-textarea>
            </ion-item>

            <ion-item>
                <ion-label position="stacked">Available equipment</ion-label>
                <ion-select placeholder="Select equipment" [formField]="infoForm.availableEquipments" multiple="true" interface="alert">
                    @for (eq of equipmentOptions; track eq) {
                        <ion-select-option [value]="eq">{{ eq }}</ion-select-option>
                    }
                </ion-select>
            </ion-item>

            <ion-item>
                <ion-label position="stacked">Main target <span>*</span></ion-label>
                <ion-select placeholder="Select main target" [formField]="infoForm.mainTargetBodypart" interface="action-sheet">
                    @for (region of bodyRegionOptions; track region) {
                        <ion-select-option [value]="region" [disabled]="mainTargetDisabled()(region)">
                            {{ region }}
                        </ion-select-option>
                    }
                </ion-select>
            </ion-item>

            <ion-item>
                <ion-label position="stacked">Secondary targets</ion-label>
                <ion-select placeholder="Select secondary targets" [formField]="infoForm.secondaryTargetBodyparts" multiple="true" interface="alert">
                    @for (region of bodyRegionOptions; track region) {
                        <ion-select-option [value]="region" [disabled]="secondaryTargetDisabled()(region)">
                            {{ region }}
                        </ion-select-option>
                    }
                </ion-select>
            </ion-item>
        </ion-list>

        <ion-button expand="block" type="button" (click)="onGenerateWithAi()" [disabled]="!isFormValid()" class="ion-margin-top"> Generate with AI </ion-button>
    </form>
</ion-content>

<ion-footer class="ion-no-border">
    <div class="flex justify-between items-center ion-padding">
        <ion-button fill="clear" type="button" (click)="onCancel()" class="ion-no-padding">
            <ion-icon name="arrow-back-outline"></ion-icon>
            <span class="ion-padding-start">Workouts</span>
        </ion-button>
        <ion-button fill="clear" type="button" (click)="onSubmit()" [disabled]="!isFormValid()" class="ion-no-padding">
            <span class="ion-padding-end">Warmup</span>
            <ion-icon name="arrow-forward-outline"></ion-icon>
        </ion-button>
    </div>
</ion-footer>
