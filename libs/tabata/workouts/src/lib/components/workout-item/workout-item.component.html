<ion-item class="workout-item" lines="full">
    <ion-label (click)="onDetailsClick()" class="workout-name-label cursor-pointer">
        <h2 class="font-semibold text-base">{{ workout().name }}</h2>
        @if (workout().description) {
            <p class="text-sm text-gray-500 line-clamp-2">{{ workout().description }}</p>
        }
        <div class="flex items-center gap-4 mt-2 text-sm text-gray-400">
            <span class="flex items-center gap-1">
                <ion-icon name="time-outline"></ion-icon>
                {{ formattedDuration }}
            </span>
            <span class="flex items-center gap-1">
                <ion-icon name="fitness-outline"></ion-icon>
                {{ blocksCount }} {{ blocksCount === 1 ? 'block' : 'blocks' }}
            </span>
        </div>
    </ion-label>
    <ion-buttons slot="end" class="workout-actions">
        <ion-button fill="clear" size="small" (click)="onEditClick($event)" aria-label="Edit workout">
            <ion-icon name="create-outline"></ion-icon>
        </ion-button>
        <ion-button fill="clear" size="small" (click)="onPlayClick($event)" aria-label="Play workout">
            <ion-icon name="play-circle"></ion-icon>
        </ion-button>
        <ion-button fill="clear" size="small" color="danger" (click)="onRemoveClick($event)" aria-label="Remove workout">
            <ion-icon name="trash-outline"></ion-icon>
        </ion-button>
    </ion-buttons>
</ion-item>
