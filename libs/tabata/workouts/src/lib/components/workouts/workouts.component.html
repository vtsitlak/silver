<ion-header [translucent]="true">
    <tbt-toolbar i18n-title="@@workouts" workouts="Workouts" title="Workouts"></tbt-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
    <div class="workouts-bar">
        <ion-searchbar
            placeholder="Search workouts"
            [value]="searchTerm()"
            (ionInput)="onSearchInput($event)"
            debounce="200"
            class="workouts-search"
        ></ion-searchbar>
        <ion-button fill="solid" (click)="addWorkout()" aria-label="Add workout">
            <ion-icon name="add"></ion-icon>
        </ion-button>
    </div>

    @if (error()) {
        <p class="error">{{ error() }}</p>
    }
    @if (isLoading()) {
        <p class="loading" i18n>Loading…</p>
    }
    @if (!isLoading() && !error()) {
        <ion-list>
            @for (workout of userWorkouts(); track workout.id) {
                <tbt-workout-item
                    [workout]="workout"
                    (detailsClick)="onDetailsClick($event)"
                    (editClick)="onEditClick($event)"
                    (playClick)="onPlayClick($event)"
                    (removeClick)="onRemoveClick($event)"
                ></tbt-workout-item>
            } @empty {
                <ion-item lines="none">
                    <p i18n>Start creating your workouts to see them here.</p>
                </ion-item>
            }
        </ion-list>
    }
</ion-content>
