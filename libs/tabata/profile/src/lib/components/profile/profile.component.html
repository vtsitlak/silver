<ion-header [translucent]="true">
    <tbt-toolbar i18n-title="@@profile" profile="Profile" title="Profile"></tbt-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
        <ion-list>
            <ion-item>
                <ion-input label="Display Name" labelPlacement="floating" type="text" formControlName="displayName"> </ion-input>
            </ion-item>

            <ion-item>
                <ion-input label="Email" labelPlacement="floating" type="email" formControlName="email"> </ion-input>
            </ion-item>

            @if(usePassword()) {
            <ion-item>
                <ion-toggle justify="end">Change password</ion-toggle>
            </ion-item>
            <ion-item>
                <ion-input label="Current Password" labelPlacement="floating" type="password" formControlName="currentPassword"> </ion-input>
            </ion-item>

            <ion-item>
                <ion-input label="New Password" labelPlacement="floating" type="password" formControlName="newPassword"> </ion-input>
            </ion-item>

            <ion-item>
                <ion-input label="Confirm new Password" labelPlacement="floating" type="password" formControlName="confirmNewPassword"> </ion-input>
            </ion-item>

            }

            <ion-button expand="block" type="submit"> Update Profile </ion-button>
        </ion-list>
    </form>
</ion-content>
