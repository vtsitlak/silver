<ion-content>
  <ion-header>
    <ion-toolbar>
      <ion-title>Login</ion-title>
    </ion-toolbar>
  </ion-header>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <ion-list>
      <ion-item>
        <ion-label position="floating">Email</ion-label>
        <ion-input type="email" formControlName="email" placeholder="Enter your email"> </ion-input>
      </ion-item>
      <ion-text color="danger" *ngIf="form.get('email')?.errors?.['required'] && form.get('email')?.touched">
        <p class="ion-padding-start">Email is required</p>
      </ion-text>
      <ion-text color="danger" *ngIf="form.get('email')?.errors?.['pattern'] && form.get('email')?.touched">
        <p class="ion-padding-start">Please enter a valid email address</p>
      </ion-text>

      <ion-item>
        <ion-label position="floating">Password</ion-label>
        <ion-input type="password" formControlName="password" placeholder="Enter your password"> </ion-input>
      </ion-item>
      <ion-text color="danger" *ngIf="form.get('password')?.errors?.['required'] && form.get('password')?.touched">
        <p class="ion-padding-start">Password is required</p>
      </ion-text>
    </ion-list>

    @if(error()) {
    <ion-text color="danger">
      <p class="ion-text-center">Invalid email or password</p>
    </ion-text>

    }


    <div class="ion-padding">is loading = {{ isLoading() }}
      <ion-button expand="block" type="submit" [disabled]="!form.valid || isLoading()">
        @if(isLoading()) {
        <ion-spinner name="crescent"></ion-spinner>
        } @else { Login }
      </ion-button>
      <ion-button expand="block" fill="outline" (click)="register()" [disabled]="isLoading()">Register</ion-button>
      <ion-button expand="block" fill="clear" (click)="forgotPassword()" [disabled]="isLoading()">Forgot password
      </ion-button>
    </div>
  </form>
</ion-content>
