<ion-content fullscreen="true">
    <div class="min-h-screen flex flex-col bg-logo bg-cover bg-center">
        <div class="form-container flex flex-col w-full mt-auto mb-0 justify-end">
            <form
                (submit)="$event.preventDefault(); onSubmit()"
                method="post"
                class="rounded-t-2xl bg-white w-full flex flex-col px-4 pb-4"
            >
                <h2 class="text-xl font-semibold mb-4" i18n="@@authForgotPasswordTitle">Forgot Password</h2>
                <div class="flex flex-col mb-2">
                    <label for="email" i18n="@@authEmailLabel" class="mb-2">Email</label>
                    <input id="email" type="email" [formField]="forgotForm.email" placeholder="Enter your email" i18n-placeholder="@@authEmailPlaceholder" />
                    <div class="h-5">
                        @if (forgotForm.email().touched() && forgotForm.email().invalid()) {
                            @for (err of forgotForm.email().errors(); track err.kind) {
                                <p class="text-error text-sm mt-1">{{ err.message }}</p>
                            }
                        }
                    </div>
                    @if (error()) {
                        <p class="text-error text-sm mt-1 text-center" i18n="@@authResetEmailFailed">Failed to send password reset email. Please try again.</p>
                    }
                </div>
                <ion-button expand="block" type="submit" [disabled]="forgotForm().invalid()">
                    @if (isLoading()) {
                        <ion-spinner name="crescent"></ion-spinner>
                    } @else {
                        <span i18n="@@authSendResetLinkButton">Send Reset Link</span>
                    }
                </ion-button>
            </form>
        </div>
    </div>
</ion-content>
