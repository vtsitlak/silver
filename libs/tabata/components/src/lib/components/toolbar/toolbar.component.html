<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button>
        <ion-icon name="home"></ion-icon>
      </ion-button>
    </ion-buttons>

    @if (title()) {
    <ion-title>{{ title() }}</ion-title>
    }


    <ion-buttons slot="end" id="click-trigger">
      <ion-button>
        <ion-icon name="menu"></ion-icon>
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-popover trigger="click-trigger" triggerAction="click">
  <ng-template>
    <ion-content>
      <ion-list>
        <ion-item button [routerLink]="['/tabs/profile']">
          <ion-icon slot="start" name="person"></ion-icon>
          <ion-label i18n="@@profile">Profile</ion-label>
        </ion-item>
        <ion-item button (click)="logout()">
          <ion-icon slot="start" name="log-out"></ion-icon>
          <ion-label i18n="@@logout">Logout</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </ng-template>
</ion-popover>
