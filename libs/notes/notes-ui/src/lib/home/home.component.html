<div class="max-w-[700px] min-w-[350px] mx-auto">

  <div class="flex justify-center items-center">

    <h2 class="text-center mr-4 font-roboto">All Notes</h2>

    <button mat-mini-fab>
      <mat-icon class="add-note-btn" (click)="onAddCourse()" matTooltip="Create new Note">add</mat-icon>
    </button>    

  </div>

  <mat-tab-group>

    <mat-tab label="All Notes">

      <lib-notes-table-list (noteChanged)="reload()" [notes]="notesFacade.notes()">

      </lib-notes-table-list>

    </mat-tab>

    <mat-tab label="Important">

      <lib-notes-table-list (noteChanged)="reload()" [notes]="notesFacade.importantNotes()"></lib-notes-table-list>      

    </mat-tab>

  </mat-tab-group>


</div>
