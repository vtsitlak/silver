@if (vehicle()) {
  <div class="flex w-full gap-4 rounded-xl bg-white p-4 shadow-sm ring-1 ring-slate-200">
    <div class="flex-1">
      <h3 class="text-lg font-semibold text-slate-900">{{brand()}}</h3>
      <h4 class="text-sm font-medium uppercase tracking-wide text-primary-700">{{type()}}</h4>
      <p class="mt-2 text-sm text-slate-600">
        @for (c of colors(); track c; let last = $last) {
          <span>{{ c }} <span [style.color]="c">#</span>
          @if (!last) {
            <span>, </span>
          }
        </span>
      }
    </p>
  </div>
  <div class="h-28 w-28 shrink-0 overflow-hidden rounded-lg border border-slate-200 bg-slate-50">
    <img
      class="h-full w-full object-cover"
      [src]="img()"
      alt="image of vehicle"
      onError="this.src='assets/images/image-not-found-scaled-1150x647.png'"
    >
  </div>
  </div>
}
