<ion-content>
  <ion-header>
    <ion-toolbar>
      <ion-title>Register</ion-title>
    </ion-toolbar>
  </ion-header>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <ion-list>
      <ion-item>
        <ion-label position="floating">Email</ion-label>
        <ion-input
          type="email"
          formControlName="email"
          placeholder="Enter your email">
        </ion-input>
      </ion-item>
      <ion-text color="danger" *ngIf="form.get('email')?.errors?.['required'] && form.get('email')?.touched">
        <p class="ion-padding-start">Email is required</p>
      </ion-text>
      <ion-text color="danger" *ngIf="form.get('email')?.errors?.['pattern'] && form.get('email')?.touched">
        <p class="ion-padding-start">Please enter a valid email address</p>
      </ion-text>

      <ion-item>
        <ion-label position="floating">Password</ion-label>
        <ion-input
          type="password"
          formControlName="password"
          placeholder="Enter your password">
        </ion-input>
      </ion-item>
      <ion-text color="danger" *ngIf="form.get('password')?.errors?.['required'] && form.get('password')?.touched">
        <p class="ion-padding-start">Password is required</p>
      </ion-text>
      <ion-text color="danger" *ngIf="form.get('password')?.errors?.['minlength'] && form.get('password')?.touched">
        <p class="ion-padding-start">Password must be at least 6 characters</p>
      </ion-text>
    </ion-list>

    <ion-text color="danger" *ngIf="error">
      <p class="ion-text-center">Registration failed. Please try again.</p>
    </ion-text>

    <div class="ion-padding">
      <ion-button expand="block" type="submit" [disabled]="!form.valid">Register</ion-button>
    </div>
  </form>
</ion-content>
